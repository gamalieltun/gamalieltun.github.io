<body>

      <nav class="site-nav" id="siteNav" aria-label="Main navigation">

          <li><a href="index.html">Home</a></li>

  <main>

    <section class="page-hero" data-label="WORK">
      <div class="container">
        <p class="mono" style="margin-bottom: 0.5rem;">Selected Work</p>
        <h1>Projects</h1>
        <p>A curated selection of systems, tools, and experiments.</p>
      </div>
    </section>

    <!-- Filter bar -->
    <div class="portfolio-filter-bar">
      <div class="container">
        <div class="filter-controls">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="Web">Web</button>
          <button class="filter-btn" data-filter="Embedded">Embedded</button>
          <button class="filter-btn" data-filter="Cloud">Cloud</button>
          <button class="filter-btn" data-filter="Mobile">Mobile</button>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="grid-3" id="projectList" aria-live="polite">
          <!-- Filled by projects.js -->
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" style="display:none;">
          <p class="mono">No projects match this filter.</p>
        </div>
      </div>

  <footer class="site-footer">

      <div class="footer-links">
        <a href="https://www.linkedin.com/in/gamalieltun/" target="_blank" rel="noopener">LinkedIn</a>

  <script src="data/projects.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/projects.js"></script>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── Filter logic ────────────────────────────
    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;

        const cards = document.querySelectorAll('#projectList .card');
        let visible = 0;
        cards.forEach(card => {
          const tags = card.dataset.tags || '';
          const show = filter === 'all' || tags.toLowerCase().includes(filter.toLowerCase());
          card.style.display = show ? '' : 'none';
          if (show) visible++;
        });

        document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
      });
    });

    // ── Card reveal ──────────────────────────────
    const cardObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal-card').forEach(el => cardObs.observe(el));
  </script>

  <!-- projects.js needs to tag cards for filter to work —
       we patch the render function to add data-tags via a MutationObserver -->
  <script>
    // Watch for injected cards and add data-tags attribute + reveal-card class
    const projObs = new MutationObserver(() => {
      document.querySelectorAll('#projectList .card:not([data-tags])').forEach(card => {
        const tagEls = card.querySelectorAll('.tag');
        const tags = Array.from(tagEls).map(t => t.textContent).join(',');
        card.dataset.tags = tags;
        card.classList.add('reveal-card');
        cardObs.observe(card);
      });
    });
    projObs.observe(document.getElementById('projectList'), { childList: true });
  </script>

<style>
/* ── Portfolio-specific styles ── */

.filter-btn {

  padding: 1rem 1.25rem;

}

.filter-btn:hover { color: var(--ink); }
.filter-btn.active { color: var(--red); border-bottom-color: var(--red); }

.empty-state {
  text-align: center;
  padding: 4rem 0;
  color: var(--ink-3);
}
</style>
